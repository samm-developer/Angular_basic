<main class="mx-auto max-w-3xl px-6 py-8">
  <a
    routerLink="/"
    class="mb-6 inline-flex items-center text-sm font-medium text-gray-600 hover:text-gray-900"
  >
    ← Back to posts
  </a>

  @if (post(); as post) {
    <article class="rounded-lg border border-gray-200 bg-white p-8 shadow-sm">
      <p class="m-0 mb-2 text-xs font-medium uppercase tracking-wide text-gray-500">
        Post #{{ post.id }} · User {{ post.userId }}
      </p>
      <h2 class="mb-4 text-2xl font-semibold capitalize text-gray-900">{{ post.title }}</h2>
      <p class="m-0 whitespace-pre-line text-sm leading-relaxed text-gray-600">{{ post.body }}</p>
    </article>
  }
</main>
