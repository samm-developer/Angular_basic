<main class="mx-auto max-w-3xl px-6 py-8">
  @for (todo of todos(); track todo.id) {
    <article
      class="mb-3 flex items-start gap-3 rounded-lg border border-gray-200 bg-white p-4 shadow-sm"
    >
      <span
        class="mt-0.5 inline-flex h-5 w-5 shrink-0 items-center justify-center rounded-full text-xs font-semibold"
        [class]="
          todo.completed
            ? 'bg-green-100 text-green-700'
            : 'bg-gray-100 text-gray-500'
        "
      >
        {{ todo.completed ? '✓' : '○' }}
      </span>
      <div class="min-w-0 flex-1">
        <p
          class="m-0 text-sm leading-relaxed"
          [class]="todo.completed ? 'text-gray-400 line-through' : 'text-gray-800'"
        >
          {{ todo.title }}
        </p>
        <p class="m-0 mt-1 text-xs text-gray-500">
          User {{ todo.userId }} · {{ todo.completed ? 'Completed' : 'Pending' }}
        </p>
      </div>
    </article>
  }
</main>
