<main class="mx-auto max-w-3xl px-6 py-8">
  @for (post of posts(); track post.id) {
    <article class="mb-4 rounded-lg border border-gray-200 bg-white p-6 shadow-sm">
      <h2 class="mb-2 text-lg font-semibold capitalize text-gray-900">{{ post.title }}</h2>
      <p class="m-0 text-sm leading-relaxed text-gray-600">{{ post.body }}</p>
    </article>
  }
</main>
