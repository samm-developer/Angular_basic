<main class="mx-auto max-w-3xl px-6 py-8">
  @for (post of posts(); track post.id) {
    <a
      [routerLink]="['/posts', post.id]"
      class="mb-4 block rounded-lg border border-gray-200 bg-white p-6 shadow-sm transition hover:border-gray-300 hover:shadow-md"
    >
      <h2 class="mb-2 text-lg font-semibold capitalize text-gray-900">{{ post.title }}</h2>
      <p class="m-0 line-clamp-2 text-sm leading-relaxed text-gray-600">{{ post.body }}</p>
    </a>
  }
</main>
